<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questions</title>
     <link href="https://fonts.googleapis.com/css?family=Poppins:100,100italic,200,200italic,300,300italic,regular,italic,500,500italic,600,600italic,700,700italic,800,800italic,900,900italic" rel="stylesheet" />
    <script src="script2.js" defer></script>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <div class="container">
        <div class="top">
            <img class="quiz" src="/images/Group 4.svg" alt="">
            <img class="volume" src="images/🦆 icon _Volume Up_.svg" alt="">
        </div>

        <div class="questions">
            <div class="question">
                <p>What is the capital of France?</p>
        </div>
        <div class="middle">
            <div class="no-of-questions">
            <p>1/20</p>
        </div>
        <div class="time">
            <p>00:30</p>
        </div>
        </div>
        <div class="options">
            <button  class="a">js</button>
            <button  class="b">Python</button>
            <button class="c" >Java</button>
            <button class="d">C++</button>
        </div>

    </div>
    <h3 class="next-button">
        next>
    </h3>
</body>
</html>
